<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
// ═══════════════════════════════════════════
//  Rashidiya Room Mess — Firebase Config
// ═══════════════════════════════════════════
firebase.initializeApp({
  apiKey:            "AIzaSyDnLXqYxp1xHbok_xt4WA4frnzWd-eCz5s",
  authDomain:        "rashidiya-room-mess.firebaseapp.com",
  projectId:         "rashidiya-room-mess",
  storageBucket:     "rashidiya-room-mess.firebasestorage.app",
  messagingSenderId: "982538508627",
  appId:             "1:982538508627:web:5d5f1158f881aa89ec69a6"
});
const db  = firebase.firestore();
const DOC = db.collection('roomapp').doc('shareddata');

// ========== DEFAULTS ==========
const DEFAULTS = {
  members:     ['Member1','Member2','Member3','Member4'],
  purchases:   [],
  cleaning:    [],
  menu:        {},
  cookMsgs:    [],
  cookGrocery: [],
  highlights:  [],
  popup:       {title:'Welcome to Rashidiya Room Mess!', body:"Check today's menu and your assigned duties!"},
  announcement:'',
  cleanDone:   {},
  adminUser:   'admin',
  adminPass:   'room1234',
  siteName:    'Rashidiya Room Mess',
  siteAccent:  'Room Mess',
  infoBlocks:[
    {id:1,icon:'📶',title:'WiFi Details',       content:'Network: \nPassword: '},
    {id:2,icon:'💰',title:'Rent & Bills',        content:'Rent due: 1st of every month\nElectricity split equally among all members.'},
    {id:3,icon:'📋',title:'House Rules',         content:'1. No guests after 10 PM\n2. Kitchen to be cleaned after cooking\n3. No littering in common areas\n4. Respect quiet hours 11 PM – 7 AM'},
    {id:4,icon:'🚨',title:'Emergency Contacts',  content:'Landlord: +91 XXXXXXXXXX\nPlumber: +91 XXXXXXXXXX\nElectrician: +91 XXXXXXXXXX'}
  ]
};

let data = {};
let adminLoggedIn = false;

// Loading overlay
document.body.insertAdjacentHTML('afterbegin',
  '<div id="fb-loading" style="position:fixed;inset:0;background:#0f0f13;z-index:99999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">' +
  '<div style="font-size:2.5rem;">🔄</div>' +
  '<div style="font-family:Syne,sans-serif;color:#f0a500;font-size:1.1rem;">Connecting to Rashidiya Room Mess…</div>' +
  '<div style="color:#888;font-size:0.85rem;" id="fb-load-msg">Please wait</div>' +
  '</div>');

// Save to Firestore
function save(){
  DOC.set(data).catch(function(e){
    console.error('Save error:',e);
    alert('Could not save. Check internet connection.\n'+e.message);
  });
}

// Real-time listener
var appStarted = false;
DOC.onSnapshot(function(snap){
  if(snap.exists){
    data = snap.data();
    Object.keys(DEFAULTS).forEach(function(k){ if(data[k]===undefined) data[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); });
  } else {
    data = JSON.parse(JSON.stringify(DEFAULTS));
    DOC.set(data);
  }
  var el = document.getElementById('fb-loading');
  if(el){ el.remove(); }
  if(!appStarted){ appStarted=true; init(); }
  else { renderAll(); renderSiteName(); }
}, function(err){
  var el=document.getElementById('fb-load-msg');
  if(el) el.innerHTML='❌ Cannot connect: '+err.message;
  console.error('Firestore error:',err);
});

// ========== INIT ==========
var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
var now  = new Date();
var todayDay = days[now.getDay()];

function init(){
  document.getElementById('live-date').textContent = now.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
  document.getElementById('today-day').textContent  = todayDay;
  var tcd = document.getElementById('today-clean-day'); if(tcd) tcd.textContent = todayDay;
  if(data.popup && data.popup.title){
    document.getElementById('popup-title').textContent = data.popup.title;
    document.getElementById('popup-body').textContent  = data.popup.body;
  }
  if(data.announcement){
    document.getElementById('announce-text').textContent = data.announcement;
    document.getElementById('announce-banner').style.display = 'flex';
  }
  renderAll();
  renderSiteName();
}

function renderAll(){
  renderMembers(); renderPurchase(); renderCleaning(); renderMenu();
  renderCookMsgs(); renderCookGrocery(); renderDashboard(); renderHighlights();
  renderInfoBlocks();
}

// ========== SECTION NAV ==========
function showSection(id, btn){
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});
  document.getElementById('section-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
  if(id==='admin')       renderAdminPanel();
  if(id==='info')        renderInfoBlocks();
  if(id==='noticeboard') renderNoticeboard();
}

// ========== MEMBERS ==========
function addMember(){
  var v=document.getElementById('member-input').value.trim(); if(!v) return;
  data.members.push(v); document.getElementById('member-input').value='';
  save(); renderMembers(); renderDashboard();
}
function removeMember(i){ data.members.splice(i,1); save(); renderMembers(); }
function renderMembers(){
  var d=document.getElementById('members-display'); var dl=document.getElementById('members-list'); if(!d||!dl) return;
  d.innerHTML=data.members.map(function(m,i){ return '<div style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0;border-bottom:1px solid var(--border);"><span>'+m+'</span><button class="del-btn" onclick="removeMember('+i+')">✕</button></div>'; }).join('');
  dl.innerHTML=data.members.map(function(m){ return '<option value="'+m+'">'; }).join('');
  var sm=document.getElementById('stat-members'); if(sm) sm.textContent=data.members.length;
}

// ========== PURCHASE ==========
function addPurchase(){
  var item={item:document.getElementById('pur-item').value.trim(),qty:document.getElementById('pur-qty').value.trim(),person:document.getElementById('pur-person').value.trim(),date:document.getElementById('pur-date').value,done:false,id:Date.now()};
  if(!item.item) return alert('Enter item name');
  data.purchases.push(item);
  document.getElementById('pur-item').value=''; document.getElementById('pur-qty').value='';
  document.getElementById('pur-person').value=''; document.getElementById('pur-date').value='';
  save(); renderPurchase(); renderDashboard();
}
function togglePurchase(id){
  var p=data.purchases.find(function(x){return x.id===id;});
  if(p){ p.done=!p.done; save(); renderPurchase(); renderDashboard(); }
}
function deletePurchase(id){ data.purchases=data.purchases.filter(function(x){return x.id!==id;}); save(); renderPurchase(); renderDashboard(); }
function renderPurchase(){
  var tbody=document.getElementById('purchase-table-body'); if(!tbody) return;
  if(!data.purchases.length){ tbody.innerHTML='<tr><td colspan="6" style="color:var(--muted);text-align:center;padding:1.5rem;">No items yet.</td></tr>'; }
  else tbody.innerHTML=data.purchases.map(function(p){ return '<tr><td>'+p.item+'</td><td>'+(p.qty||'-')+'</td><td>'+(p.person||'Unassigned')+'</td><td>'+(p.date||'-')+'</td><td><span class="badge '+(p.done?'badge-green':'badge-yellow')+'">'+(p.done?'Done':'Pending')+'</span></td><td style="display:flex;gap:0.4rem;"><button class="btn btn-sm '+(p.done?'btn-red':'btn-green')+'" onclick="togglePurchase('+p.id+')">'+(p.done?'Undo':'✓ Done')+'</button><button class="del-btn" onclick="deletePurchase('+p.id+')">✕</button></td></tr>'; }).join('');
  var pending=data.purchases.filter(function(p){return !p.done;}).length;
  var done=data.purchases.filter(function(p){return p.done;}).length;
  var po=document.getElementById('purchase-overview');
  if(po) po.innerHTML='<div class="highlight-box red-hl"><div class="highlight-text">🕐 Pending: <strong>'+pending+'</strong> items</div></div><div class="highlight-box green-hl"><div class="highlight-text">✅ Completed: <strong>'+done+'</strong> items</div></div>';
  var sp=document.getElementById('stat-pending'); if(sp) sp.textContent=pending;
  var byPerson={};
  data.purchases.filter(function(p){return !p.done;}).forEach(function(p){ var n=p.person||'Unassigned'; if(!byPerson[n]) byPerson[n]=[]; byPerson[n].push(p); });
  var pbp=document.getElementById('purchase-by-person'); if(!pbp) return;
  var keys=Object.keys(byPerson);
  if(!keys.length){ pbp.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">All items done! 🎉</div>'; return; }
  pbp.innerHTML=keys.map(function(name){ return '<div class="highlight-box" style="margin-bottom:0.75rem;"><strong style="color:var(--accent)">'+name+'</strong><div style="margin-top:0.4rem;">'+byPerson[name].map(function(i){ return '<span class="badge badge-yellow" style="margin:2px;">'+i.item+(i.qty?' ('+i.qty+')':'')+'</span>'; }).join(' ')+'</div></div>'; }).join('');
}

// ========== CLEANING ==========
function toggleCleanForm(){ var f=document.getElementById('clean-add-form'); f.style.display=f.style.display==='none'?'block':'none'; if(f.style.display==='block') cancelCleanEdit(); }
function cancelCleanEdit(){
  document.getElementById('clean-edit-id').value='';
  document.getElementById('clean-form-title').textContent='Add Cleaning Task';
  document.getElementById('clean-task').value=''; document.getElementById('clean-person').value='';
  document.getElementById('clean-day').value='Daily'; document.getElementById('clean-area').value='Kitchen';
  document.getElementById('clean-date').value=''; document.getElementById('clean-notes').value='';
}
function editCleaning(id){
  var c=data.cleaning.find(function(x){return x.id===id;}); if(!c) return;
  document.getElementById('clean-add-form').style.display='block';
  document.getElementById('clean-edit-id').value=id; document.getElementById('clean-form-title').textContent='Update Task';
  document.getElementById('clean-task').value=c.task; document.getElementById('clean-person').value=c.person||'';
  document.getElementById('clean-day').value=c.day; document.getElementById('clean-area').value=c.area;
  document.getElementById('clean-date').value=c.date||''; document.getElementById('clean-notes').value=c.notes||'';
  document.getElementById('clean-add-form').scrollIntoView({behavior:'smooth'});
}
function saveCleaningTask(){
  var editId=document.getElementById('clean-edit-id').value; var task=document.getElementById('clean-task').value.trim(); if(!task) return alert('Enter task name');
  var obj={task:task,person:document.getElementById('clean-person').value.trim(),day:document.getElementById('clean-day').value,area:document.getElementById('clean-area').value,date:document.getElementById('clean-date').value,notes:document.getElementById('clean-notes').value.trim()};
  if(editId){ var idx=data.cleaning.findIndex(function(x){return x.id==editId;}); if(idx>-1){obj.id=data.cleaning[idx].id;data.cleaning[idx]=obj;} }
  else { obj.id=Date.now(); data.cleaning.push(obj); }
  document.getElementById('clean-add-form').style.display='none'; cancelCleanEdit(); save(); renderCleaning(); renderDashboard();
}
function deleteCleaning(id){ if(!confirm('Delete this task?')) return; data.cleaning=data.cleaning.filter(function(x){return x.id!==id;}); save(); renderCleaning(); }
function toggleCleanDone(id){
  var key=id+'_'+now.toLocaleDateString();
  if(!data.cleanDone[key]){ data.cleanDone[key]={done:true,time:now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}; }
  else { delete data.cleanDone[key]; }
  save(); renderCleaning(); renderDashboard();
}
function markAllDoneToday(){
  var todayISO=now.toISOString().split('T')[0];
  data.cleaning.filter(function(c){return c.day==='Daily'||c.day===todayDay||c.day==='Weekly'||(c.date&&c.date===todayISO);}).forEach(function(c){
    var key=c.id+'_'+now.toLocaleDateString(); if(!data.cleanDone[key]) data.cleanDone[key]={done:true,time:now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})};
  }); save(); renderCleaning(); renderDashboard();
}
function renderCleaning(){
  var todayISO=now.toISOString().split('T')[0];
  var today=data.cleaning.filter(function(c){return c.day==='Daily'||c.day===todayDay||c.day==='Weekly'||(c.date&&c.date===todayISO);});
  var todayList=document.getElementById('today-cleaning-list'); if(!todayList) return;
  if(!today.length){ todayList.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">No cleaning tasks for today.</div>'; }
  else{
    todayList.innerHTML='<div style="display:flex;justify-content:flex-end;margin-bottom:0.75rem;"><button class="btn btn-sm btn-green" onclick="markAllDoneToday()">✓ Mark All Done</button></div>'+
      today.map(function(c){ var key=c.id+'_'+now.toLocaleDateString(); var doneObj=data.cleanDone[key]; var done=doneObj&&doneObj.done;
        return '<div class="check-item '+(done?'done':'')+'"><input type="checkbox" '+(done?'checked':'')+' onchange="toggleCleanDone('+c.id+')"><div style="flex:1;"><span><strong>'+c.task+'</strong> — <span class="badge badge-blue" style="font-size:0.72rem;">'+c.area+'</span></span><div style="font-size:0.8rem;color:var(--muted);margin-top:2px;">👤 '+(c.person||'Anyone')+(c.notes?' 📝 '+c.notes:'')+(done&&doneObj.time?' <span style="color:var(--green)">✓ Done @ '+doneObj.time+'</span>':'')+'</div></div></div>';
      }).join('');
    var allDone=today.every(function(c){return data.cleanDone[c.id+'_'+now.toLocaleDateString()];});
    if(allDone) todayList.innerHTML+='<div style="text-align:center;padding:1rem;color:var(--green);font-family:Syne,sans-serif;">🎉 All tasks done for today!</div>';
  }
  var upcoming=data.cleaning.filter(function(c){return c.date&&c.date>todayISO;}).sort(function(a,b){return a.date>b.date?1:-1;});
  var upEl=document.getElementById('upcoming-cleaning-list');
  if(upEl){ if(!upcoming.length) upEl.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">No upcoming scheduled tasks.</div>';
    else upEl.innerHTML=upcoming.map(function(c){ var d=new Date(c.date); var diff=Math.ceil((d-now)/(1000*60*60*24));
      return '<div class="highlight-box" style="margin-bottom:0.6rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.5rem;"><div><strong>'+c.task+'</strong> — '+c.area+'<div style="font-size:0.8rem;color:var(--muted);margin-top:2px;">👤 '+(c.person||'Anyone')+' 📅 '+c.date+' <span style="color:var(--accent)">('+diff+' day'+(diff!==1?'s':'')+' away)</span></div></div><button class="btn btn-sm" onclick="editCleaning('+c.id+')">✏️ Edit</button></div>';}).join('');}
  var tbody=document.getElementById('cleaning-table-body');
  if(tbody){ if(!data.cleaning.length){ tbody.innerHTML='<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:1.5rem;">No tasks yet.</td></tr>'; }
    else tbody.innerHTML=data.cleaning.map(function(c){ var key=c.id+'_'+now.toLocaleDateString(); var doneObj=data.cleanDone[key]; var done=doneObj&&doneObj.done; var isToday=c.day==='Daily'||c.day===todayDay||c.day==='Weekly'||(c.date&&c.date===todayISO);
      return '<tr style="'+(isToday?'background:rgba(240,165,0,0.04);':'')+'"><td><strong>'+c.task+'</strong></td><td>'+c.area+'</td><td>'+(c.person||'Anyone')+'</td><td><span class="badge badge-blue">'+c.day+'</span></td><td>'+(c.date?'<span class="badge badge-purple">'+c.date+'</span>':'<span style="color:var(--muted)">—</span>')+'</td><td style="font-size:0.82rem;color:var(--muted);">'+(c.notes||'—')+'</td><td><span class="badge '+(done?'badge-green':'badge-yellow')+'" style="cursor:pointer;" onclick="toggleCleanDone('+c.id+')">'+(done?'✓ Done'+(doneObj.time?' @ '+doneObj.time:''):'Pending')+'</span></td><td style="display:flex;gap:0.4rem;"><button class="btn btn-sm btn-blue" onclick="editCleaning('+c.id+')">✏️</button><button class="del-btn" onclick="deleteCleaning('+c.id+')">✕</button></td></tr>';}).join('');}
  var histEl=document.getElementById('cleaning-history');
  if(histEl){ var hist=[]; for(var i=0;i<7;i++){ var d=new Date(now); d.setDate(d.getDate()-i); var dateStr=d.toLocaleDateString(); var label=i===0?'Today':i===1?'Yesterday':d.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'}); var doneTasks=Object.entries(data.cleanDone).filter(function(e){return e[1]&&e[1].done&&e[0].endsWith('_'+dateStr);}); hist.push({label:label,count:doneTasks.length,tasks:doneTasks.map(function(e){ var cid=parseInt(e[0].split('_')[0]); var c=data.cleaning.find(function(x){return x.id===cid;}); return c?c.task:'Unknown'; })}); }
    histEl.innerHTML=hist.map(function(h){ return '<div style="display:flex;align-items:center;gap:1rem;padding:0.6rem 0;border-bottom:1px solid var(--border);"><div style="min-width:90px;font-size:0.85rem;color:var(--muted);">'+h.label+'</div><div style="flex:1;">'+(h.count?h.tasks.map(function(t){return '<span class="badge badge-green" style="margin:2px;">'+t+'</span>';}).join(' '):'<span style="color:var(--muted);font-size:0.82rem;">No tasks completed</span>')+'</div><div style="font-family:Syne,sans-serif;font-weight:700;color:'+(h.count?'var(--green)':'var(--muted)')+';">'+h.count+'</div></div>'; }).join('');}
  var doneCount=Object.entries(data.cleanDone).filter(function(e){return e[1]&&e[1].done&&e[0].includes(now.toLocaleDateString());}).length;
  var st=document.getElementById('stat-tasks'); if(st) st.textContent=doneCount;
}

// ========== MENU ==========
var defaultMenu={Monday:{main:'Rice & Dal',desc:'Simple weekday meal',sides:['Sabzi','Pickle']},Tuesday:{main:'Chapati & Sabzi',desc:'Freshly made rotis',sides:['Dal','Salad']},Wednesday:{main:'Biryani',desc:'Midweek special!',sides:['Raita','Papad']},Thursday:{main:'Rice & Sambar',desc:'South Indian style',sides:['Chutney','Pickle']},Friday:{main:'Pulao & Curry',desc:'Light Friday fare',sides:['Salad','Curd']},Saturday:{main:'Special Thali',desc:'Weekend special 🎉',sides:['Dal','Sabzi','Sweet','Papad']},Sunday:{main:'Rest / Self Cook',desc:'Cook your favourite!',sides:['Bread','Eggs']}};
function saveMenu(){
  var day=document.getElementById('menu-day').value; var main=document.getElementById('menu-main-input').value.trim(); if(!main) return alert('Enter main dish');
  data.menu[day]={main:main,desc:document.getElementById('menu-desc-input').value.trim(),sides:document.getElementById('menu-sides-input').value.split(',').map(function(s){return s.trim();}).filter(Boolean)};
  document.getElementById('menu-main-input').value=''; document.getElementById('menu-desc-input').value=''; document.getElementById('menu-sides-input').value='';
  save(); renderMenu(); renderDashboard();
}
function renderMenu(){
  var container=document.getElementById('menu-weekly-display'); if(!container) return;
  container.innerHTML=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(function(d){ var m=data.menu[d]||defaultMenu[d]; var isToday=d===todayDay;
    return '<div class="card" style="'+(isToday?'border-color:rgba(240,165,0,0.4);':'')+'"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;"><div style="font-family:Syne,sans-serif;font-weight:700;font-size:1rem;">'+d+' '+(isToday?'<span class="today-badge" style="font-size:0.7rem;">TODAY</span>':'')+'</div></div><div style="font-size:1.1rem;font-weight:500;margin-bottom:0.3rem;">'+m.main+'</div><div style="color:var(--muted);font-size:0.83rem;margin-bottom:0.7rem;">'+(m.desc||'')+'</div><div>'+(m.sides||[]).map(function(s){return '<span class="menu-item-tag">'+s+'</span>';}).join(' ')+'</div></div>';}).join('');
}

// ========== COOK ==========
function postCookMessage(){
  var name=document.getElementById('cook-name').value.trim(); var msg=document.getElementById('cook-msg-input').value.trim(); if(!name||!msg) return alert('Enter name and message');
  data.cookMsgs.unshift({name:name,msg:msg,time:now.toLocaleString('en-IN'),id:Date.now()});
  document.getElementById('cook-name').value=''; document.getElementById('cook-msg-input').value='';
  save(); renderCookMsgs(); renderDashboard();
}
function deleteCookMsg(id){ data.cookMsgs=data.cookMsgs.filter(function(x){return x.id!==id;}); save(); renderCookMsgs(); renderDashboard(); }
function renderCookMsgs(){
  var el=document.getElementById('cook-messages-list'); if(!el) return;
  if(!data.cookMsgs.length){ el.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">No messages yet.</div>'; return; }
  el.innerHTML=data.cookMsgs.map(function(m){ return '<div class="cook-msg"><div class="cook-msg-header"><div class="cook-avatar">'+m.name[0]+'</div><div><div class="cook-msg-name">'+m.name+'</div><div class="cook-msg-time">'+m.time+'</div></div><button class="del-btn" style="margin-left:auto;" onclick="deleteCookMsg('+m.id+')">✕</button></div><div class="cook-msg-body">'+m.msg+'</div></div>'; }).join('');
}
function addCookGrocery(){
  var name=document.getElementById('cook-req-name').value.trim(); var items=document.getElementById('cook-req-items').value.trim(); var date=document.getElementById('cook-req-date').value;
  if(!name||!items) return alert('Fill cook name and items');
  data.cookGrocery.unshift({name:name,items:items,date:date,id:Date.now()});
  document.getElementById('cook-req-name').value=''; document.getElementById('cook-req-items').value=''; document.getElementById('cook-req-date').value='';
  save(); renderCookGrocery();
}
function deleteCookGrocery(id){ data.cookGrocery=data.cookGrocery.filter(function(x){return x.id!==id;}); save(); renderCookGrocery(); }
function renderCookGrocery(){
  var el=document.getElementById('cook-grocery-list'); if(!el) return;
  if(!data.cookGrocery.length){ el.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">No requests yet.</div>'; return; }
  el.innerHTML=data.cookGrocery.map(function(g){ return '<div class="highlight-box" style="margin-bottom:0.75rem;"><div style="display:flex;justify-content:space-between;align-items:center;"><strong style="color:var(--accent)">'+g.name+'</strong><div style="display:flex;align-items:center;gap:0.5rem;">'+(g.date?'<span style="font-size:0.8rem;color:var(--muted);">By: '+g.date+'</span>':'')+'<button class="del-btn" onclick="deleteCookGrocery('+g.id+')">✕</button></div></div><div style="margin-top:0.4rem;font-size:0.88rem;white-space:pre-line;">'+g.items+'</div></div>'; }).join('');
}

// ========== HIGHLIGHTS ==========
function addHighlight(){
  var text=document.getElementById('hl-text').value.trim(); var type=document.getElementById('hl-type').value; if(!text) return;
  data.highlights.push({text:text,type:type,id:Date.now()}); document.getElementById('hl-text').value='';
  save(); renderHighlights(); renderNoticeboard();
}
function deleteHighlight(id){ data.highlights=data.highlights.filter(function(x){return x.id!==id;}); save(); renderHighlights(); renderNoticeboard(); }
function renderHighlights(){
  var el=document.getElementById('dash-highlights'); if(!el) return;
  var tc={yellow:'highlight-box',red:'highlight-box red-hl',green:'highlight-box green-hl'};
  if(!data.highlights.length){ el.innerHTML='<div class="highlight-box red-hl"><div class="highlight-text">🛒 Vegetables running low</div></div><div class="highlight-box green-hl"><div class="highlight-text">✅ Kitchen cleaned yesterday</div></div><div class="highlight-box"><div class="highlight-text">💡 Save electricity!</div></div>'; return; }
  el.innerHTML=data.highlights.map(function(h){ return '<div class="'+(tc[h.type]||'highlight-box')+'" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.75rem;"><div class="highlight-text">'+h.text+'</div></div>'; }).join('');
}
function renderNoticeboard(){
  var ca=document.getElementById('nb-current-announce');
  if(ca) ca.innerHTML=data.announcement?'<div class="announce-banner" style="display:flex;"><div class="announce-icon">📣</div><div class="announce-text"><strong>Current banner:</strong> '+data.announcement+'</div></div>':'<div style="color:var(--muted);font-size:0.83rem;">No active announcement.</div>';
  var hl=document.getElementById('nb-highlights-list'); if(!hl) return;
  var tc={yellow:'highlight-box',red:'highlight-box red-hl',green:'highlight-box green-hl'};
  if(!data.highlights.length){ hl.innerHTML='<div style="color:var(--muted);font-size:0.85rem;">No highlights yet.</div>'; return; }
  hl.innerHTML='<div style="font-size:0.82rem;color:var(--muted);margin-bottom:0.6rem;">Current highlights:</div>'+
    data.highlights.map(function(h){ return '<div class="'+(tc[h.type]||'highlight-box')+'" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem;"><div class="highlight-text">'+h.text+'</div><button class="del-btn" onclick="deleteHighlight('+h.id+')">✕</button></div>'; }).join('');
}

// ========== SITE NAME ==========
function saveSiteName(){
  var name=document.getElementById('site-name-input').value.trim(); var accent=document.getElementById('site-accent-input').value.trim(); if(!name) return alert('Enter a site name');
  data.siteName=name; data.siteAccent=accent; save(); renderSiteName();
  document.getElementById('site-name-input').value=''; document.getElementById('site-accent-input').value='';
}
function renderSiteName(){
  var logo=document.getElementById('site-logo'); if(!logo) return;
  var name=data.siteName||'RoomBoss'; var accent=data.siteAccent||'';
  if(accent&&name.includes(accent)){ var parts=name.split(accent); logo.innerHTML='🏠 '+parts[0]+'<span>'+accent+'</span>'+(parts[1]||''); }
  else { logo.innerHTML='🏠 <span>'+name+'</span>'; }
  var preview=document.getElementById('site-name-preview'); if(preview) preview.textContent=name;
  document.title=name+' — Room Manager';
}

// ========== INFO BLOCKS ==========
function toggleInfoForm(){ var f=document.getElementById('info-add-form'); f.style.display=f.style.display==='none'?'block':'none'; if(f.style.display==='block') cancelInfoEdit(); }
function cancelInfoEdit(){ document.getElementById('info-edit-id').value=''; document.getElementById('info-form-label').textContent='Add Information'; document.getElementById('info-title-input').value=''; document.getElementById('info-content-input').value=''; document.getElementById('info-add-form').style.display='none'; }
function editInfoBlock(id){
  var block=data.infoBlocks.find(function(x){return x.id===id;}); if(!block) return;
  document.getElementById('info-add-form').style.display='block'; document.getElementById('info-edit-id').value=id;
  document.getElementById('info-form-label').textContent='Edit Info Block'; document.getElementById('info-title-input').value=block.title; document.getElementById('info-content-input').value=block.content;
  document.getElementById('info-add-form').scrollIntoView({behavior:'smooth'});
}
function saveInfo(){
  var editId=document.getElementById('info-edit-id').value; var title=document.getElementById('info-title-input').value.trim(); var content=document.getElementById('info-content-input').value.trim();
  if(!title||!content) return alert('Fill both fields');
  if(editId){ var idx=data.infoBlocks.findIndex(function(x){return x.id==editId;}); if(idx>-1){data.infoBlocks[idx].title=title;data.infoBlocks[idx].content=content;} }
  else { data.infoBlocks.push({id:Date.now(),icon:'📌',title:title,content:content}); }
  cancelInfoEdit(); save(); renderInfoBlocks(); renderAdminInfoManager();
}
function deleteInfoBlock(id){ if(!confirm('Delete this info block?')) return; data.infoBlocks=data.infoBlocks.filter(function(x){return x.id!==id;}); save(); renderInfoBlocks(); renderAdminInfoManager(); }
function renderInfoBlocks(){
  var el=document.getElementById('info-list'); if(!el) return;
  if(!data.infoBlocks.length){ el.innerHTML='<div style="color:var(--muted);">No info blocks yet.</div>'; return; }
  el.innerHTML=data.infoBlocks.map(function(b){ return '<div class="info-block" style="position:relative;">'+(adminLoggedIn?'<button class="del-btn" style="position:absolute;top:1rem;right:3rem;" onclick="editInfoBlock('+b.id+')" title="Edit">✏️</button><button class="del-btn" style="position:absolute;top:1rem;right:1rem;" onclick="deleteInfoBlock('+b.id+')" title="Delete">✕</button>':'')+'<h4>'+b.icon+' '+b.title+'</h4><p style="white-space:pre-line;">'+b.content+'</p></div>'; }).join('');
  var addBtn=document.getElementById('info-add-btn'); if(addBtn) addBtn.style.display=adminLoggedIn?'inline-block':'none';
}
function renderAdminInfoManager(){
  var el=document.getElementById('admin-info-manager'); if(!el) return;
  if(!data.infoBlocks.length){ el.innerHTML='<div style="color:var(--muted);font-size:0.85rem;">No info blocks yet.</div>'; return; }
  el.innerHTML=data.infoBlocks.map(function(b){ return '<div style="display:flex;align-items:center;gap:0.75rem;padding:0.65rem 0;border-bottom:1px solid var(--border);"><span style="font-size:1.2rem;">'+b.icon+'</span><div style="flex:1;"><strong style="font-size:0.9rem;">'+b.title+'</strong><div style="font-size:0.78rem;color:var(--muted);white-space:pre-line;">'+(b.content.length>60?b.content.slice(0,60)+'…':b.content)+'</div></div><button class="btn btn-sm btn-blue" onclick="editInfoBlock('+b.id+');showSection(\'info\',document.querySelectorAll(\'nav button\')[5])">✏️ Edit</button><button class="del-btn" onclick="deleteInfoBlock('+b.id+')">✕</button></div>'; }).join('');
}

// ========== ADMIN AUTH ==========
function doAdminLogin(){
  var u=document.getElementById('admin-username-input').value.trim(); var p=document.getElementById('admin-password-input').value; var err=document.getElementById('admin-login-error');
  if(u===data.adminUser&&p===data.adminPass){ adminLoggedIn=true; document.getElementById('admin-login-gate').style.display='none'; document.getElementById('admin-panel').style.display='block'; document.getElementById('admin-username-input').value=''; document.getElementById('admin-password-input').value=''; err.style.display='none'; renderAdminPanel(); renderInfoBlocks(); }
  else { err.style.display='block'; document.getElementById('admin-password-input').value=''; }
}
function adminLogout(){ adminLoggedIn=false; document.getElementById('admin-login-gate').style.display='block'; document.getElementById('admin-panel').style.display='none'; renderInfoBlocks(); }
function renderAdminPanel(){ if(!adminLoggedIn) return; renderMembers(); renderAdminHLList(); renderAdminInfoManager(); var sp=document.getElementById('site-name-preview'); if(sp) sp.textContent=data.siteName||'RoomBoss'; }
function togglePwdVisibility(inputId,btn){ var inp=document.getElementById(inputId); if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}else{inp.type='password';btn.textContent='👁';} }
function changeAdminCredentials(){
  var u=document.getElementById('new-uname').value.trim(); var p=document.getElementById('new-pwd').value; var c=document.getElementById('confirm-pwd').value;
  if(!u||!p) return alert('Enter both username and password'); if(p!==c) return alert('Passwords do not match!'); if(p.length<6) return alert('Password must be at least 6 characters');
  data.adminUser=u; data.adminPass=p; save(); document.getElementById('new-uname').value=''; document.getElementById('new-pwd').value=''; document.getElementById('confirm-pwd').value=''; alert('✅ Credentials updated! Username: '+u);
}
function renderAdminHLList(){
  var el=document.getElementById('admin-highlights-list'); if(!el) return;
  var tc={yellow:'highlight-box',red:'highlight-box red-hl',green:'highlight-box green-hl'};
  if(!data.highlights.length){ el.innerHTML=''; return; }
  el.innerHTML=data.highlights.map(function(h){ return '<div class="'+(tc[h.type]||'highlight-box')+'" style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:0.5rem;"><div class="highlight-text">'+h.text+'</div><button class="del-btn" onclick="deleteHighlight('+h.id+')">✕</button></div>'; }).join('');
}

// ========== POPUP / ANNOUNCEMENT ==========
function savePopup(){
  data.popup.title=document.getElementById('popup-title-input').value.trim()||data.popup.title;
  data.popup.body=document.getElementById('popup-msg-input').value.trim()||data.popup.body;
  save(); alert('✅ Popup saved! Will show on next page load for everyone.');
}
function postAnnouncement(){
  var text=document.getElementById('announce-input').value.trim(); if(!text) return;
  data.announcement=text; save();
  document.getElementById('announce-text').textContent=text;
  document.getElementById('announce-banner').style.display='flex';
  document.getElementById('announce-input').value=''; renderNoticeboard();
}
function clearAnnouncement(){ data.announcement=''; save(); document.getElementById('announce-banner').style.display='none'; renderNoticeboard(); }

// ========== CLEAR DATA ==========
function confirmClear(key,msg){
  if(!confirm(msg+'\nThis removes it for EVERYONE. Cannot be undone!')) return;
  if(key==='cleanDone') data.cleanDone={};
  else data[key]=[];
  save(); renderAll(); renderAdminPanel(); alert('✅ Cleared.');
}
function confirmClearAll(){
  var code=prompt('⚠️ Type DELETE to confirm clearing ALL data for everyone:');
  if(code==='DELETE'){
    var u=data.adminUser; var p=data.adminPass; var sn=data.siteName; var sa=data.siteAccent;
    data=JSON.parse(JSON.stringify(DEFAULTS)); data.adminUser=u; data.adminPass=p; data.siteName=sn; data.siteAccent=sa;
    save(); alert('All data cleared.'); location.reload();
  } else { alert('Cancelled.'); }
}

// ========== DASHBOARD ==========
function renderDashboard(){
  var m=data.menu[todayDay]||defaultMenu[todayDay];
  var dmn=document.getElementById('dash-menu-name'); if(dmn) dmn.textContent=m.main;
  var dmd=document.getElementById('dash-menu-desc'); if(dmd) dmd.textContent=m.desc||'';
  var dmi=document.getElementById('dash-menu-items'); if(dmi) dmi.innerHTML=(m.sides||[]).map(function(s){return '<span class="menu-item-tag">'+s+'</span>';}).join('');
  var cleanToday=data.cleaning.filter(function(c){return c.day==='Daily'||c.day===todayDay||c.day==='Weekly';});
  var todayISO=now.toISOString().split('T')[0];
  var purToday=data.purchases.filter(function(p){return !p.done&&(p.date===todayISO||!p.date);});
  var dutiesEl=document.getElementById('dash-duties');
  if(dutiesEl){ var h=''; if(cleanToday.length) h+=cleanToday.map(function(c){return '<div class="highlight-box" style="margin-bottom:0.6rem;"><div class="highlight-text">🧹 <strong>'+c.task+'</strong> ('+c.area+') → '+(c.person||'Anyone')+'</div></div>';}).join(''); if(purToday.length) h+=purToday.slice(0,3).map(function(p){return '<div class="highlight-box red-hl" style="margin-bottom:0.6rem;"><div class="highlight-text">🛒 Buy: <strong>'+p.item+'</strong>'+(p.person?' → '+p.person:'')+'</div></div>';}).join(''); dutiesEl.innerHTML=h||'<div style="color:var(--muted);font-size:0.88rem;">No duties for today! 🎉</div>'; }
  var cookEl=document.getElementById('dash-cook-latest');
  if(cookEl){ if(data.cookMsgs.length){ var m2=data.cookMsgs[0]; cookEl.innerHTML='<div class="cook-msg"><div class="cook-msg-header"><div class="cook-avatar">'+m2.name[0]+'</div><div><div class="cook-msg-name">'+m2.name+'</div><div class="cook-msg-time">'+m2.time+'</div></div></div><div class="cook-msg-body">'+m2.msg+'</div></div>'; } else cookEl.innerHTML='<div style="color:var(--muted);font-size:0.88rem;">No messages yet.</div>'; }
}
</script>
